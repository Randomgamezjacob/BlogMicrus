<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sign Up — BlogMicrus</title>
        <meta name="description" content="Create a BlogMicrus account and start publishing microblog posts.">
        <meta name="robots" content="noindex,nofollow">
        <link rel="canonical" href="https://example.com/signup.html">
        <link rel="stylesheet" href="style.css" id="style">
    </head>
    <body>
        <h1>Sign Up And Create Your Own Blog Today</h1>
        <p>Email:</p>
        <input type="text" id="email">
        <p>Password:</p>
        <input type="password" id="password">
        <p>Display Name:</p>
        <input type="text" id="name">
        <p></p>
        <button id="signup">Sign Up</button>
        <p id="error">If something goes wrong, it will be displayed here.</p>
        <h3>Already have an account? <a href="login.html">Log in here</a></h3>
        <script src="./signup.js" type="module"></script>
        <script src="./style.js" type="module"></script>
    </body>
</html>
