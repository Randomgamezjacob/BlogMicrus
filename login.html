<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Log In — BlogMicrus</title>
        <meta name="description" content="Log in to your BlogMicrus account to create and manage microblog posts.">
        <meta name="robots" content="noindex,nofollow">
        <link rel="canonical" href="https://example.com/login.html">
        <link rel="stylesheet" href="style.css" id="style">
        <link rel="icon" href="blogmicrus logo.png">
    </head>
    <body>
        <h1>Log In to BlogMicrus</h1>
        <p>Email:</p>
        <input type="text" id="email">
        <p>Password:</p>
        <input type="password" id="password">
        <p></p>
        <button id="login">Log In</button>
        <p id="error">If something goes wrong, it will be displayed here.</p>
        <h3>No account? <a href="signup.html">Sign up here</a></h3>
        <script src="./login.js" type="module"></script>
        <script src="./style.js" type="module"></script>
    </body>
</html>
