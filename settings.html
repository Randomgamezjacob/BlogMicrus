<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Settings — BlogMicrus</title>
        <meta name="description" content="Customize site and blog appearance on BlogMicrus.">
        <meta name="robots" content="noindex,nofollow">
        <link rel="canonical" href="https://blogmicrus.vercel.app/settings.html">
        <link rel="stylesheet" href="style.css" id="style">
        <link rel="icon" href="blogmicrus logo.png">
    </head>
    <body>
        <h1>Settings</h1>
        <p>The CSS you will see across the site:</p>
        <select id="theme">
            <option value="style.css">Default</option>
            <option value="terminalmode.css">Terminal</option>
            <option value="neonskin.css">Bright</option>
            <option value="none.css">Minimalist</option>
            <option value="none-dark.css">Minimalist Dark</option>
            <option value="corporate-neon.css">Neon</option>
        </select>
        <p>The CSS your blog will use:</p>
        <select id="blog-theme">
            <option value="style.css">Default</option>
            <option value="terminalmode.css">Terminal</option>
            <option value="neonskin.css">Bright</option>
            <option value="none.css">Minimalist</option>
            <option value="none-dark.css">Minimalist Dark</option>
            <option value="corporate-neon.css">Neon</option>
        </select>
        <script src="./settings.js" type="module"></script>
        <script src="./style.js" type="module"></script>
    </body>
</html>
