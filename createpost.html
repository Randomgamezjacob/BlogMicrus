<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Create Post — BlogMicrus</title>
        <meta name="description" content="Create a new microblog post on BlogMicrus. Add title, content, video links and category.">
        <meta name="robots" content="noindex,nofollow">
        <link rel="canonical" href="https://blogmicrus.vercel.app/createpost.html">
        <link rel="stylesheet" href="style.css" id="style">
        <link rel="icon" href="blogmicrus logo.png">
    </head>
    <body>
        <h1>Create Post</h1>
        <p>Title:</p>
        <input type="text" id="title">
        <p>Content:</p>
        <textarea id="body"></textarea>
        <p>Video Link:</p>
        <input type="text" id="video-link">
        <p>Category:</p>
        <select id="category"></select>
        <button id="create">Create Post</button>
        <p>(For video links, we recommend using File Garden, and to convert images or audio to a video, try VidMix.)</p>
        <script src="./createpost.js" type="module"></script>
        <script src="./style.js" type="module"></script>
    </body>
</html>
